# 认证配置模块参数
bearer_token: null
basic_auth_username: abc
basic_auth_password: cba
api_key: null
api_key_header: null
tenant_code: tenantA

# 多租户账号（key = tenant_code）
# 测试类通过 TENANT 类属性声明使用哪个租户，tests/api/conftest.py 的 get_token fixture 会按需登录
tenants:
  tenantA:
    username: userA
    password: passA
  tenantB:
    username: userB
    password: passB
  tenant_admin:
    username: userAdmin
    password: passAdmin
  monitor-group:
    username: userMonitor
    password: passMonitor

